# Build nuke_ext4 LKM for Android 15 / kernel 6.6 (GKI).
# Ported from mountify's .github/workflows/gki-kernel.yaml (master), simplified
# to a single android15-6.6-lts target. Produces nuke.ko as a workflow artifact.
#
# The ko is functionally equivalent to mountify's prebuilt nuke-android15-6.6.ko.
# After a successful run, download the artifact and drop it onto
# module/src/lkm/nuke.ko if you want to rebuild the module zip with it.
#
# NOTE: This workflow syncs the full AOSP GKI kernel manifest (~50-100 GB) and
# builds with Bazel/Kleaf. It only runs on manual dispatch to avoid burning CI
# minutes on every push.
name: Build nuke.ko (Android 15 / 6.6)

on:
  workflow_dispatch:
    inputs:
      os_patch_level:
        description: "Manifest branch patch level (default: lts)"
        required: false
        default: "lts"

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build nuke.ko for android15-6.6
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev \
            libelf-dev git python3 unzip wget cpio gcc-aarch64-linux-gnu llvm-15

      - name: Clone AOSP GKI kernel (android15-6.6)
        run: |
          mkdir android-kernel && cd android-kernel
          TAG="android15-6.6-${{ inputs.os_patch_level }}"
          echo "Fetching GKI manifest branch: common-${TAG}"
          curl https://storage.googleapis.com/git-repo-downloads/repo > repo
          chmod +x repo
          ./repo init --manifest-depth=1 --depth=1 \
            https://android.googlesource.com/kernel/manifest -b "common-${TAG}"
          ./repo sync -c -j $(nproc)
          rm -rf .repo

      - name: Prepare GKI and inject nuke_ext4_lkm
        working-directory: android-kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang

          pwd
          cd common

          # Inject our nuke_ext4_lkm source into the kernel tree.
          mv ../../nuke_ext4_lkm drivers/nuke_ext4_lkm
          ls -lha drivers/nuke_ext4_lkm

          # Wire it into Kconfig / Makefile.
          sed -i 's/endmenu//g' drivers/Kconfig
          echo 'source "drivers/nuke_ext4_lkm/Kconfig"' >> drivers/Kconfig
          echo 'endmenu' >> drivers/Kconfig
          echo 'obj-y += nuke_ext4_lkm/' >> drivers/Makefile

          # android15-6.6 uses Bazel/Kleaf (no build/build.sh). Patch the
          # module list so bazel builds + ships nuke.ko, and relax the
          # "needs unknown symbol" check caused by MODULE_IMPORT_NS.
          if [ ! -e build/build.sh ]; then
            sed -i 's/needs unknown symbol/Dont abort when unknown symbol/g' build/kernel/*.sh || echo "No unknown symbol scripts found"
            if [ -e common/modules.bzl ]; then
              sed -i 's/_COMMON_GKI_MODULES_LIST = \[/_COMMON_GKI_MODULES_LIST = \[ "drivers\/nuke_ext4_lkm\/nuke.ko",/g' common/modules.bzl
            fi
          else
            TARGET_FILE="build/kernel/build.sh"
            if [ ! -e "$TARGET_FILE" ]; then
              TARGET_FILE="build/build.sh"
            fi
            sed -i 's/needs unknown symbol/Dont abort when unknown symbol/g' $TARGET_FILE || echo "No unknown symbol in $TARGET_FILE"
            sed -i 's/if ! diff -u "\${KERNEL_DIR}\/\${MODULES_ORDER}" "\${OUT_DIR}\/modules\.order"; then/if false; then/g' $TARGET_FILE
            sed -i 's@${ROOT_DIR}/build/abi/compare_to_symbol_list@echo@g' $TARGET_FILE
            sed -i 's/needs unknown symbol/Dont abort when unknown symbol/g' build/kernel/*.sh || echo "No unknown symbol scripts found"
          fi

          tail -n10 drivers/Kconfig
          tail -n10 drivers/Makefile
          echo $PATH ; pwd

          cd ../
          ls -la

          # Build. android15-6.6 has no build/build.sh, so go through Kleaf.
          if [ -e build/build.sh ]; then
            LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh CC="clang"
          else
            tools/bazel run --config=fast --config=stamp --lto=thin \
              //common:kernel_aarch64_dist -- --dist_dir=dist
          fi

          if [ -f ./dist/nuke.ko ]; then
            mv ./dist/nuke.ko nuke.ko
          else
            mv out/android15-6.6/common/drivers/nuke_ext4_lkm/nuke.ko nuke.ko
          fi

      - name: Verify nuke.ko
        run: |
          ls -la android-kernel/nuke.ko
          file android-kernel/nuke.ko
          sha256sum android-kernel/nuke.ko

      - name: Upload nuke.ko
        uses: actions/upload-artifact@v4
        with:
          name: nuke-android15-6.6
          path: android-kernel/nuke.ko
          if-no-files-found: error
