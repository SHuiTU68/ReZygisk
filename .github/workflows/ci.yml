name: Untrusted CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Setup Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install cryptography

      - name: Setup NDK_PATH
        run: echo "NDK_PATH=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

      - name: Build
        run: |
          make all -j$(nproc)

      - name: Upload release
        uses: actions/upload-artifact@v4
        with:
          name: ReZygisk-release
          path: "build/out/ReZygisk-v*-release.zip"
          if-no-files-found: warn

      - name: Upload debug
        uses: actions/upload-artifact@v4
        with:
          name: ReZygisk-debug
          path: "build/out/ReZygisk-v*-debug.zip"
          if-no-files-found: warn
