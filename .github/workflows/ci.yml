name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  # INFO: Build the Hrezygisk module zip. Uses the prebuilt nuke.ko from
  # mountify (module/src/lkm/nuke.ko, kernel 6.6 / Android 15, aarch64).
  # We no longer build the ko from source in CI — the Kleaf kernel_module()
  # approach kept failing (make: No targets), and maintaining an AOSP kernel
  # clone + Bazel build just for one ko was too heavy. The prebuilt ko works
  # on all Android 15 / 6.6 GKI devices.
  build:
    name: Build (${{ matrix.build_type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [ debug, release ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Setup Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install cryptography

      - name: Setup NDK_PATH
        run: echo "NDK_PATH=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

      - name: Verify prebuilt nuke.ko
        run: |
          ls -la module/src/lkm/nuke.ko
          file module/src/lkm/nuke.ko
          sha256sum module/src/lkm/nuke.ko

      - name: Build
        run: make ${{ matrix.build_type }} -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hrezygisk-${{ matrix.build_type }}
          path: "build/out/Hrezygisk-v*-${{ matrix.build_type }}.zip"
          if-no-files-found: error
          retention-days: 30

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/Hrezygisk-debug/*.zip
            artifacts/Hrezygisk-release/*.zip
