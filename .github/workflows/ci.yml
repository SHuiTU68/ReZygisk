name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      skip_lkm:
        description: "Skip nuke.ko source build (use prebuilt ko). Use when you only changed module/webui code."
        required: false
        default: false
        type: boolean

jobs:
  # INFO: Build nuke.ko from source against AOSP android15-6.6-lts GKI kernel.
  # Runs on EVERY CI run by default (push, PR, manual) so the module zip always
  # contains a freshly-built ko. Pass skip_lkm=true on manual dispatch to skip
  # when you only touched module/webui code and want a fast run.
  # Optimization: only build the kernel_aarch64_modules target (not the full
  # kernel image), which skips vmlinux/boot.img and cuts build time ~40%.
  build-lkm:
    name: Build nuke.ko
    runs-on: ubuntu-latest
    if: ${{ !((github.event_name == 'workflow_dispatch') && (inputs.skip_lkm == true)) }}
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 20480
          temp-reserve-mb: 4096
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev \
            libelf-dev git python3 unzip wget cpio gcc-aarch64-linux-gnu llvm-15

      # INFO: Clone AOSP GKI kernel source for android15-6.6.
      # We use the Kleaf (Bazel) build system which requires the `common`
      # kernel source + the `build/` project (tools/bazel wrapper).
      #
      # IMPORTANT: The manifest branch is `common-android15-6.6` (NOT -lts).
      # The `-lts` variant has a different project layout that does not include
      # a top-level `build` project, causing "project build not found" errors.
      #
      # We sync the full manifest (no project filter) because Kleaf needs
      # multiple projects (common, build, prebuilts). Syncing only `common`
      # + `build` fails because the manifest doesn't define `build` as a
      # standalone project name in this branch.
      #
      # Optimization: --depth=1 + -c (only current branch) keeps it shallow.
      # Retry logic handles transient Google server connection resets.
      - name: Clone AOSP GKI kernel (android15-6.6)
        run: |
          set -e
          mkdir -p android-kernel && cd android-kernel
          echo "=== Disk space before clone ==="
          df -h .
          echo "Fetching GKI manifest branch: common-android15-6.6"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo > repo
          chmod +x repo
          # repo init with retries.
          for attempt in 1 2 3; do
            echo "=== repo init attempt $attempt ==="
            if ./repo init -u https://android.googlesource.com/kernel/manifest \
                -b common-android15-6.6 --depth=1; then
              break
            fi
            echo "repo init attempt $attempt failed, retrying in 10s..."
            [ "$attempt" = "3" ] && { echo "ERROR: repo init failed 3 times"; exit 1; }
            rm -rf .repo
            sleep 10
          done
          # Sync the full manifest. Kleaf needs common + build + prebuilts.
          # Limit -j to 8 to avoid Google server connection resets.
          for attempt in 1 2 3; do
            echo "=== repo sync attempt $attempt ==="
            if ./repo sync -c -j8 --force-sync; then
              break
            fi
            echo "repo sync attempt $attempt failed, retrying in 15s..."
            [ "$attempt" = "3" ] && { echo "ERROR: repo sync failed 3 times"; exit 1; }
            sleep 15
          done
          echo "=== Disk space after clone ==="
          df -h .
          echo "=== Verifying build/ exists ==="
          ls -la build/ 2>&1 | head -5 || { echo "ERROR: build/ dir missing"; exit 1; }
          echo "=== Verifying common/ exists ==="
          ls -la common/ 2>&1 | head -5 || { echo "ERROR: common/ dir missing"; exit 1; }

      - name: Prepare GKI and inject nuke_ext4_lkm
        working-directory: android-kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang

          cd common
          # Inject our nuke_ext4_lkm source into the kernel tree.
          mv ../../nuke_ext4_lkm drivers/nuke_ext4_lkm

          # Wire it into Kconfig / Makefile.
          sed -i 's/endmenu//g' drivers/Kconfig
          echo 'source "drivers/nuke_ext4_lkm/Kconfig"' >> drivers/Kconfig
          echo 'endmenu' >> drivers/Kconfig
          echo 'obj-y += nuke_ext4_lkm/' >> drivers/Makefile

          # Patch modules.bzl so bazel builds + ships nuke.ko, and relax the
          # "needs unknown symbol" check caused by MODULE_IMPORT_NS.
          cd ..
          sed -i 's/needs unknown symbol/Dont abort when unknown symbol/g' build/kernel/*.sh 2>/dev/null || true
          if [ -e common/modules.bzl ]; then
            sed -i 's/_COMMON_GKI_MODULES_LIST = \[/_COMMON_GKI_MODULES_LIST = \[ "drivers\/nuke_ext4_lkm\/nuke.ko",/g' common/modules.bzl
          fi

      # INFO: Optimization — build ONLY the modules target, not the full
      # kernel image. This skips vmlinux, boot.img, and cuts ~40% of build
      # time. Falls back to _dist if _modules target doesn't exist.
      - name: Build nuke.ko via Kleaf
        working-directory: android-kernel
        run: |
          mkdir -p dist
          # Try the modules-only target first (much faster — no vmlinux).
          if tools/bazel build --config=fast --lto=thin //common:kernel_aarch64_modules 2>&1; then
            echo "modules target built, locating nuke.ko..."
            find bazel-bin -name "nuke.ko" -exec cp {} dist/nuke.ko \;
          else
            echo "modules target failed, falling back to full dist..."
            tools/bazel run --config=fast --config=stamp --lto=thin \
              //common:kernel_aarch64_dist -- --dist_dir=dist
          fi
          test -f dist/nuke.ko || { echo "ERROR: nuke.ko not found"; exit 1; }

      - name: Verify nuke.ko
        run: |
          ls -la android-kernel/dist/nuke.ko
          file android-kernel/dist/nuke.ko
          sha256sum android-kernel/dist/nuke.ko

      - name: Upload nuke.ko
        uses: actions/upload-artifact@v4
        with:
          name: nuke-ko
          path: android-kernel/dist/nuke.ko
          if-no-files-found: error
          retention-days: 30

  # INFO: Build the Hrezygisk module zip. Depends on build-lkm so the freshly
  # built ko gets baked into the zip. If build-lkm was skipped (manual
  # skip_lkm=true), the prebuilt module/src/lkm/nuke.ko is used instead.
  build:
    name: Build (${{ matrix.build_type }})
    needs: build-lkm
    # INFO: Run module build when build-lkm succeeded OR was skipped.
    # If build-lkm failed, skip the module build (no fresh ko to embed).
    if: ${{ always() && (needs.build-lkm.result == 'success' || needs.build-lkm.result == 'skipped') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [ debug, release ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Setup Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install cryptography

      - name: Setup NDK_PATH
        run: echo "NDK_PATH=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

      # INFO: If build-lkm ran and produced a fresh nuke.ko, download it and
      # overwrite the prebuilt ko before building the module zip.
      - name: Download freshly built nuke.ko (if available)
        if: needs.build-lkm.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: nuke-ko
          path: module/src/lkm/

      - name: Rename downloaded ko to nuke.ko
        if: needs.build-lkm.result == 'success'
        run: |
          # The artifact may be named differently; ensure it's nuke.ko.
          cd module/src/lkm
          for f in *.ko; do
            if [ "$f" != "nuke.ko" ]; then
              mv "$f" nuke.ko
            fi
          done
          ls -la nuke.ko
          file nuke.ko

      - name: Build
        run: make ${{ matrix.build_type }} -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hrezygisk-${{ matrix.build_type }}
          path: "build/out/Hrezygisk-v*-${{ matrix.build_type }}.zip"
          if-no-files-found: error
          retention-days: 30

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/Hrezygisk-debug/*.zip
            artifacts/Hrezygisk-release/*.zip
